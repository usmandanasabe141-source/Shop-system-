<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Super Market POS</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.nav{
display:flex;
background:#10b981;
}

.nav button{
flex:1;
padding:18px;
border:none;
background:none;
color:white;
font-size:16px;
}

.page{
display:none;
padding:20px;
}

.active{
display:block;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
max-width:800px;
margin:auto;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
}

button{
cursor:pointer;
}

.save{
background:#10b981;
width:100%;
padding:14px;
margin-top:10px;
border:none;
color:white;
border-radius:10px;
}

.delete{
background:red;
padding:8px;
border:none;
color:white;
}

.price{
font-size:35px;
text-align:center;
color:#00ff88;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #444;
}

</style>

</head>

<body>

<div class="nav">

<button onclick="openPage('add')">

Add Product

</button>

<button onclick="openPage('search')">

Search

</button>

<button onclick="openPage('dashboard')">

Dashboard

</button>

</div>

<!-- ADD -->

<div
id="add"

class="page active">

<div class="card">

<h2>

Add Product

</h2>

<input
id="product"
placeholder="Product Name">

<input
id="price"
type="number"
placeholder="Price (₦)">

<button
class="save"
onclick="saveProduct()">

SAVE

</button>

<div id="msg">

</div>

</div>

</div>

<!-- SEARCH -->

<div
id="search"

class="page">

<div class="card">

<h2>

Search Product

</h2>

<input
id="searchInput"
placeholder="Enter Product Name"
onkeyup="searchProduct()">

<div
class="price"
id="result">

₦0

</div>

</div>

</div>

<!-- DASHBOARD -->

<div
id="dashboard"

class="page">

<div class="card">

<h2>

Dashboard

</h2>

<table>

<tr>

<th>

Product

</th>

<th>

Price

</th>

<th>

Delete

</th>

</tr>

<tbody
id="table">

</tbody>

</table>

</div>

</div>

<script>

let products=

JSON.parse(

localStorage
.getItem(
"market"
)

)

||

[];

function update(){

localStorage
.setItem(

"market",

JSON.stringify(
products
)

);

show();

}

function saveProduct(){

let n=
product.value.trim();

let p=
price.value;

if(!n||!p){

msg.innerHTML=
"Fill Fields";

return;

}

products.push({

name:
n.toLowerCase(),

price:p

});

update();

msg.innerHTML=
"✅ Saved";

}

function searchProduct(){

let s=

searchInput
.value
.toLowerCase();

let found=

products.find(

x=>

x.name===s

);

result.innerHTML=

found

?

"₦"+found.price

:

"Not Found";

}

function remove(i){

products.splice(i,1);

update();

}

function show(){

table.innerHTML="";

products.forEach(

(x,i)=>{

table.innerHTML+=`

<tr>

<td>

${x.name}

</td>

<td>

₦${x.price}

</td>

<td>

<button

class="delete"

onclick=

"remove(${i})"

>

Delete

</button>

</td>

</tr>

`;

}

);

}

function openPage(id){

document
.querySelectorAll(
".page"
)

.forEach(

x=>

x.style.display=
"none"

);

document
.getElementById(
id
)

.style.display=
"block";

}

show();

</script>

</body>

</html>
